name: Auto response

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  welcome-new-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome new issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) return;

            // Don't respond to bots
            if (issue.user?.type === "Bot") return;

            // Check if this is a new issue (not a comment or label event)
            const action = context.payload.action;
            if (action !== "opened") return;

            // Send welcome message
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `👋 Thanks for opening an issue!

This is the **Termux Fork** of OpenClaw. Please make sure your issue is related to Termux/Android compatibility.

For general OpenClaw questions or issues, consider checking:
- [Official Docs](https://docs.openclaw.ai)
- [Discord Community](https://discord.gg/clawd)
- [Main Repo](https://github.com/openclaw/openclaw)

A maintainer will review your issue shortly.`,
            });
